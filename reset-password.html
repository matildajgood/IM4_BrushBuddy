<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <title>BrushBuddy – Passwort zurücksetzen</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2"/>
          <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
          <line x1="9" y1="9" x2="9.01" y2="9"/>
          <line x1="15" y1="9" x2="15.01" y2="9"/>
        </svg>
      </div>

      <h1 class="login-title">BrushBuddy</h1>
      <p class="login-subtitle">Neues Passwort setzen</p>

      <div id="invalidToken" class="login-error hidden" style="margin-bottom:20px;">
        Dieser Link ist ungültig oder abgelaufen. Bitte fordere einen neuen Link an.
      </div>

      <form id="resetForm">
        <div class="login-field">
          <label class="login-label">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            Neues Passwort
          </label>
          <input type="password" id="newPassword" placeholder="Mindestens 8 Zeichen" required />
        </div>

        <div class="login-field">
          <label class="login-label">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            Passwort bestätigen
          </label>
          <input type="password" id="confirmPassword" placeholder="Passwort wiederholen" required />
        </div>

        <div id="resetError" class="login-error hidden"></div>
        <div id="resetSuccess" class="login-success hidden">
          Passwort erfolgreich geändert! <a href="login.html">Zum Login</a>
        </div>

        <button type="submit" class="login-btn">Passwort speichern</button>
      </form>

      <a href="login.html" class="forgot-link" style="margin-top:16px;display:block;">Zurück zum Login</a>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const token  = params.get('token');

      // Validate token on load
      if (!token) {
        document.getElementById('invalidToken').classList.remove('hidden');
        document.getElementById('resetForm').style.display = 'none';
      } else {
        fetch(`api/reset-password.php?token=${encodeURIComponent(token)}`)
          .then(r => r.json())
          .then(result => {
            if (result.status !== 'valid') {
              document.getElementById('invalidToken').classList.remove('hidden');
              document.getElementById('resetForm').style.display = 'none';
            }
          })
          .catch(() => {
            document.getElementById('invalidToken').classList.remove('hidden');
            document.getElementById('resetForm').style.display = 'none';
          });
      }

      document.getElementById('resetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const password  = document.getElementById('newPassword').value;
        const confirm   = document.getElementById('confirmPassword').value;
        const errorEl   = document.getElementById('resetError');
        const successEl = document.getElementById('resetSuccess');

        errorEl.classList.add('hidden');
        successEl.classList.add('hidden');

        if (password.length < 8) {
          errorEl.textContent = 'Das Passwort muss mindestens 8 Zeichen lang sein.';
          errorEl.classList.remove('hidden');
          return;
        }

        if (password !== confirm) {
          errorEl.textContent = 'Die Passwörter stimmen nicht überein.';
          errorEl.classList.remove('hidden');
          return;
        }

        try {
          const response = await fetch('api/reset-password.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, password }),
          });
          const result = await response.json();

          if (result.status === 'success') {
            document.getElementById('resetForm').style.display = 'none';
            successEl.classList.remove('hidden');
          } else if (result.message === 'invalid_or_expired') {
            errorEl.textContent = 'Dieser Link ist ungültig oder abgelaufen.';
            errorEl.classList.remove('hidden');
          } else if (result.message === 'password_too_short') {
            errorEl.textContent = 'Das Passwort muss mindestens 8 Zeichen lang sein.';
            errorEl.classList.remove('hidden');
          } else {
            errorEl.textContent = 'Ein Fehler ist aufgetreten. Bitte versuche es erneut.';
            errorEl.classList.remove('hidden');
          }
        } catch {
          errorEl.textContent = 'Ein Fehler ist aufgetreten. Bitte versuche es erneut.';
          errorEl.classList.remove('hidden');
        }
      });
    </script>
  </body>
</html>
