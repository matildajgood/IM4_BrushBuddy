<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BrushBuddy – Registrieren</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="login-page">
    <div class="login-card">

      <div class="login-logo">
        <img src="images/Logo_BrushBuddy.svg" width="55" height="55" />
      </div>

      <h1 class="login-title">BrushBuddy</h1>
      <p class="login-subtitle">Neues Konto erstellen</p>

      <form id="registerForm">
        <div class="login-field">
          <label class="login-label">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="8" r="4"/>
              <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
            Vorname
          </label>
          <input type="text" id="vorname" placeholder="Dein Vorname" required />
        </div>

        <div class="login-field">
          <label class="login-label">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="8" r="4"/>
              <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
            Nachname
          </label>
          <input type="text" id="name" placeholder="Dein Nachname" required />
        </div>

        <div class="login-field">
          <label class="login-label">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            Email
          </label>
          <input type="email" id="email" placeholder="Deine E-Mail-Adresse" required />
        </div>

        <div class="login-field">
          <label class="login-label">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            Passwort
          </label>
          <input type="password" id="password" placeholder="Passwort wählen" required />
        </div>

        <div id="registerError" class="login-error hidden"></div>
        <div id="registerSuccess" class="login-success hidden"></div>

        <button type="submit" class="login-btn">Registrieren</button>
      </form>

      <p class="login-register-hint">Bereits ein Konto? <a href="login.html" class="login-register-link">Anmelden</a></p>

    </div>

    <script src="js/register.js"></script>
  </body>
</html>
