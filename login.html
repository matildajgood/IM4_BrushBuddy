<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>BrushBuddy – Parent Login</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <img src="assets/Logo_BrushBuddy.svg" width="40" height="40" />
      </div>

      <h1 class="login-title">BrushBuddy</h1>
      <p class="login-subtitle">Parent Login</p>

      <form id="loginForm">
        <div class="login-field">
          <label class="login-label">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            Email
          </label>
          <input type="email" id="email" placeholder="Enter your email" required />
        </div>

        <div class="login-field">
          <label class="login-label">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            Password
          </label>
          <input type="password" id="password" placeholder="Enter parent password" required />
        </div>

        <div id="loginError" class="login-error hidden">
          Incorrect email or password. Please try again.
        </div>

        <button type="submit" class="login-btn">Login</button>
      </form>

    </div>

    <script src="js/login.js"></script>
  </body>
</html>
