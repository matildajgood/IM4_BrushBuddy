<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BrushBuddy – Sticker Collection</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="sticker-body">

    <nav class="page-nav">
      <span class="page-nav-logo">BrushBuddy</span>
      <div class="page-nav-right">
        <button id="navLogoutBtn" class="logout-btn">Logout</button>
        <div class="nav-profile-wrapper">
          <button class="profile-icon-btn" onclick="toggleProfile()" title="Profil bearbeiten">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="8" r="4"/>
              <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
          </button>
          <div id="navProfileForm" class="profile-dropdown hidden">
            <p class="profile-dropdown-name" id="navProfileName">...</p>
            <div class="profile-form-grid">
              <div>
                <label>Vorname</label>
                <input type="text" id="navProfileVorname" />
              </div>
              <div>
                <label>Name</label>
                <input type="text" id="navProfileName2" />
              </div>
              <div>
                <label>Email</label>
                <input type="email" id="navProfileEmail" />
              </div>
              <div>
                <label>Neues Passwort (optional)</label>
                <input type="password" id="navProfilePassword" placeholder="Leer lassen = unverändert" />
              </div>
            </div>
            <div class="edit-form-buttons">
              <button onclick="saveNavProfile()">Speichern</button>
              <button class="btn-cancel" onclick="toggleProfile()">Abbrechen</button>
            </div>
            <p id="navProfileMsg" class="hidden profile-msg"></p>
          </div>
        </div>
      </div>
    </nav>

    <div class="sticker-page">

      <a id="backLink" href="child-profile.html" class="back-link">&#8592; Back to Profile</a>

      <div class="sticker-card">
        <h1 class="sticker-title">Sticker Collection</h1>
        <p class="sticker-subtitle">Collect all 24 stickers by brushing every day!</p>

        <div class="sticker-counter-wrap">
          <span class="sticker-counter" id="stickerCounter">Collected: 0 / 24</span>
        </div>

        <div class="sticker-grid" id="stickerGrid"></div>

        <div class="sticker-howto">
          <h2 class="sticker-howto-title">How to Earn Stickers</h2>
          <ul class="sticker-howto-list">
            <li>&#x2B50; Brush twice a day to earn 2 stickers daily</li>
            <li>&#x1F525; Maintain your streak for bonus stickers</li>
            <li>&#x1F3C6; Complete weekly challenges for special stickers</li>
          </ul>
        </div>
      </div>

    </div>

    <script src="js/sticker-collection.js"></script>
    <script src="js/nav.js"></script>
  </body>
</html>
