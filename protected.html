<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BrushBuddy Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="dashboard-body">
    <div class="dashboard">

      <header class="dashboard-header">
        <div class="header-left">
          <h1 class="dashboard-title">BrushBuddy Dashboard</h1>
          <p id="currentDate" class="dashboard-date"></p>
        </div>
        <div class="header-right">
          <span class="hub-status">&#x1F4F6; Connected to Brush Hub</span>
          <button id="logoutBtn" class="logout-btn">Logout</button>
          <div class="profile-dropdown-wrapper">
            <button class="profile-icon-btn" onclick="toggleProfile()" title="Profil bearbeiten">
              <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="8" r="4"/>
                <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
              </svg>
            </button>
            <div id="profileForm" class="profile-dropdown hidden">
              <p class="profile-dropdown-name" id="profileName">...</p>
              <div class="profile-form-grid">
                <div>
                  <label>Vorname</label>
                  <input type="text" id="profileVorname" />
                </div>
                <div>
                  <label>Name</label>
                  <input type="text" id="profileName2" />
                </div>
                <div>
                  <label>Email</label>
                  <input type="email" id="profileEmail" />
                </div>
                <div>
                  <label>Neues Passwort (optional)</label>
                  <input type="password" id="profilePassword" placeholder="Leer lassen = unverändert" />
                </div>
              </div>
              <div class="edit-form-buttons">
                <button onclick="saveProfile()">Speichern</button>
                <button class="btn-cancel" onclick="toggleProfile()">Abbrechen</button>
              </div>
              <p id="profileMsg" class="hidden profile-msg"></p>
            </div>
          </div>
        </div>
      </header>

      <div id="noChildSection" class="no-child-section hidden">
        <h2>Noch kein Kind hinzugefügt</h2>
        <form id="addChildForm" class="add-child-form">
          <input type="text" id="childName" placeholder="Name des Kindes" required />
          <input type="date" id="childGeburtstag" required />
          <button type="submit">Kind hinzufügen</button>
        </form>
      </div>

      <div id="childrenContainer" class="children-grid"></div>

      <section class="family-overview">
        <h2 class="overview-title">&#x1F46A; Family Overview</h2>
        <div class="overview-stats">
          <div class="stat-box">
            <span class="stat-number" id="totalStreakDays">—</span>
            <span class="stat-label">Total Streak Days</span>
          </div>
          <div class="stat-box stat-green">
            <span class="stat-number" id="brushedTodayCount">—</span>
            <span class="stat-label">Brushed Today</span>
          </div>
          <div class="stat-box stat-pink">
            <span class="stat-number" id="totalStickers">—</span>
            <span class="stat-label">Total Stickers</span>
          </div>
          <div class="stat-box stat-purple">
            <span class="stat-number" id="weeklyAverage">—</span>
            <span class="stat-label">Weekly Average</span>
          </div>
        </div>
      </section>

    </div>

    <script src="js/protected.js"></script>
    <script src="js/logout.js"></script>
  </body>
</html>
