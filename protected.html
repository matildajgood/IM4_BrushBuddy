<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BrushBuddy Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="dashboard-body">
    <div class="dashboard">

      <header class="dashboard-header">
        <div class="header-left">
          <h1 class="dashboard-title">BrushBuddy Dashboard</h1>
          <p id="currentDate" class="dashboard-date"></p>
        </div>
        <div class="header-right">
          <span class="hub-status">&#x1F4F6; Connected to Brush Hub</span>
          <button id="logoutBtn" class="logout-btn">Logout</button>
        </div>
      </header>

      <div id="noChildSection" class="no-child-section hidden">
        <h2>Noch kein Kind hinzugefügt</h2>
        <form id="addChildForm" class="add-child-form">
          <input type="text" id="childName" placeholder="Name des Kindes" required />
          <input type="date" id="childGeburtstag" required />
          <button type="submit">Kind hinzufügen</button>
        </form>
      </div>

      <div id="childrenContainer" class="children-grid"></div>

      <section class="family-overview">
        <h2 class="overview-title">&#x1F46A; Family Overview</h2>
        <div class="overview-stats">
          <div class="stat-box">
            <span class="stat-number" id="totalStreakDays">—</span>
            <span class="stat-label">Total Streak Days</span>
          </div>
          <div class="stat-box stat-green">
            <span class="stat-number" id="brushedTodayCount">—</span>
            <span class="stat-label">Brushed Today</span>
          </div>
          <div class="stat-box stat-pink">
            <span class="stat-number" id="totalStickers">—</span>
            <span class="stat-label">Total Stickers</span>
          </div>
          <div class="stat-box stat-purple">
            <span class="stat-number" id="longestStreak">—</span>
            <span class="stat-label">Longest Streak</span>
          </div>
        </div>
      </section>

    </div>

    <script src="js/protected.js"></script>
    <script src="js/logout.js"></script>
  </body>
</html>
