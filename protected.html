<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BrushBuddy Dashboard</title>
    <link rel="stylesheet" href="css/style.css?v=4" />
  </head>
  <body class="dashboard-body">
    <div class="dashboard">

      <nav class="page-nav">
        <span class="page-nav-logo">BrushBuddy</span>
        <div class="page-nav-right">
          <button id="navLogoutBtn" class="logout-btn">Abmelden</button>
          <div class="nav-profile-wrapper">
            <button class="profile-icon-btn" onclick="toggleProfile()" title="Profil bearbeiten">
              <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="8" r="4"/>
                <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
              </svg>
            </button>
            <div id="navProfileForm" class="profile-dropdown hidden">
              <p class="profile-dropdown-name" id="navProfileName">...</p>
              <div class="profile-form-grid">
                <div>
                  <label>Vorname</label>
                  <input type="text" id="navProfileVorname" />
                </div>
                <div>
                  <label>Name</label>
                  <input type="text" id="navProfileName2" />
                </div>
                <div>
                  <label>Email</label>
                  <input type="email" id="navProfileEmail" />
                </div>
                <div>
                  <label>Neues Passwort (optional)</label>
                  <input type="password" id="navProfilePassword" placeholder="Leer lassen = unverändert" />
                </div>
              </div>
              <div class="edit-form-buttons">
                <button onclick="saveNavProfile()">Speichern</button>
                <button class="btn-cancel" onclick="toggleProfile()">Abbrechen</button>
              </div>
              <p id="navProfileMsg" class="hidden profile-msg"></p>
            </div>
          </div>
        </div>
      </nav>

      <p id="currentDate" class="dashboard-date"></p>

      <div id="noChildSection" class="no-child-section hidden">
        <h2>Noch kein Kind hinzugefügt</h2>
      </div>

      <div id="childrenContainer" class="children-grid"></div>

      <div class="add-child-section">
        <button type="button" class="add-child-toggle-btn" onclick="toggleAddChildForm()">+ Kind hinzufügen</button>
        <form id="addChildForm" class="add-child-form hidden">
          <input type="text" id="childName" placeholder="Name des Kindes" required />
          <input type="date" id="childGeburtstag" required />
          <div class="edit-form-buttons">
            <button type="submit">Hinzufügen</button>
            <button type="button" class="btn-cancel" onclick="toggleAddChildForm()">Abbrechen</button>
          </div>
        </form>
      </div>

      <!-- Family Code -->
      <section class="family-code-section">
        <div class="family-code-left">
          <span class="family-code-label">&#x1F46A; Dein Family-Code</span>
          <span class="family-code-value" id="familyCodeDisplay">—</span>
        </div>
        <div class="family-code-right">
          <input type="text" id="joinCodeInput" placeholder="Code eingeben…" class="family-code-input" maxlength="9" />
          <button onclick="joinFamily()" class="family-join-btn">Beitreten</button>
        </div>
        <p id="familyMsg" class="family-msg hidden"></p>
      </section>

      <section class="family-overview">
        <h2 class="overview-title">Kalender</h2>
        <div id="familyCalendar"></div>
        <div class="cal-legend">
          <span class="cal-dot" style="background:#dcfce7;border:1px solid #86efac"></span><span>2 Mal geputzt</span>
          <span class="cal-dot" style="background:#fff7ed;border:1px solid #fdba74"></span><span>1 Mal geputzt</span>
          <span class="cal-dot" style="background:#fee2e2;border:1px solid #fca5a5"></span><span>Nicht geputzt</span>
          <span class="cal-dot" style="background:#f3f4f6;border:1px solid #d1d5db"></span><span>Noch ausstehend</span>
        </div>
      </section>

    </div>

    <script src="js/avatar.js?v=4"></script>
    <script src="js/protected.js?v=4"></script>
    <script src="js/nav.js?v=4"></script>
  </body>
</html>
