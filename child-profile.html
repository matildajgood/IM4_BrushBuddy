<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BrushBuddy – Profil</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="profile-body">

    <nav class="page-nav">
      <span class="page-nav-logo">BrushBuddy</span>
      <div class="page-nav-right">
        <button id="navLogoutBtn" class="logout-btn">Abmelden</button>
        <div class="nav-profile-wrapper">
          <button class="profile-icon-btn" onclick="toggleProfile()" title="Profil bearbeiten">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="8" r="4"/>
              <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
          </button>
          <div id="navProfileForm" class="profile-dropdown hidden">
            <p class="profile-dropdown-name" id="navProfileName">...</p>
            <div class="profile-form-grid">
              <div>
                <label>Vorname</label>
                <input type="text" id="navProfileVorname" />
              </div>
              <div>
                <label>Name</label>
                <input type="text" id="navProfileName2" />
              </div>
              <div>
                <label>Email</label>
                <input type="email" id="navProfileEmail" />
              </div>
              <div>
                <label>Neues Passwort (optional)</label>
                <input type="password" id="navProfilePassword" placeholder="Leer lassen = unverändert" />
              </div>
            </div>
            <div class="edit-form-buttons">
              <button onclick="saveNavProfile()">Speichern</button>
              <button class="btn-cancel" onclick="toggleProfile()">Abbrechen</button>
            </div>
            <p id="navProfileMsg" class="hidden profile-msg"></p>
          </div>
        </div>
      </div>
    </nav>

    <div class="profile-page">

      <a href="protected.html" class="back-link">&#8592; Zurück zum Dashboard</a>

      <!-- Profile card -->
      <div class="profile-card">
        <div class="profile-card-header">
          <div class="profile-avatar-wrap" id="profileAvatar">🦄</div>
          <div class="profile-card-info">
            <h1 class="profile-child-name" id="profileChildName">...</h1>
            <div class="profile-badges">
              <span class="badge badge-level" id="profileLevel">Level 1</span>
              <span class="badge badge-streak" id="profileStreakBadge">&#x1F3C6; 0 Tage Streak</span>
            </div>
          </div>
        </div>
        <div class="profile-progress-section">
          <div class="profile-progress-header">
            <span id="profileProgressLabel">Fortschritt zu Level 2</span>
            <span id="profileProgressCount">0 / 7 Punkte</span>
          </div>
          <div class="progress-bar profile-progress-bar">
            <div class="progress-fill" id="profileProgressFill" style="width: 0%"></div>
          </div>
          <a id="viewStickersLink" href="sticker-collection.html" class="level-overview-link">Alle 25 Level ansehen &#x2192;</a>
        </div>
      </div>

      <!-- Stat cards -->
      <div class="profile-stats-grid">
        <div class="profile-stat-card">
          <div class="profile-stat-icon profile-stat-icon-yellow">&#x2B50;</div>
          <div class="profile-stat-body">
            <p class="profile-stat-title">Meine Punkte</p>
            <p class="profile-stat-number" id="statPoints">0</p>
          </div>
        </div>
        <div class="profile-stat-card">
          <div class="profile-stat-icon profile-stat-icon-orange">&#x1F3C6;</div>
          <div class="profile-stat-body">
            <p class="profile-stat-title">Aktueller Streak</p>
            <p class="profile-stat-number" id="statStreak">0 Tage</p>
          </div>
        </div>
      </div>

      <!-- Recent Activity -->
      <div class="profile-activity-card">
        <h2 class="profile-activity-title">&#x1F4C5; Letzte Aktivitäten</h2>
        <div id="activityList" class="activity-list"></div>
      </div>

    </div>

    <script src="js/avatar.js"></script>
    <script src="js/child-profile.js"></script>
    <script src="js/nav.js"></script>
  </body>
</html>
